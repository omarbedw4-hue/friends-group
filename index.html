<!DOCTYPE html><html><head><meta charset="UTF-8"><title>شات الأصحاب</title><script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script><style>body{font-family:sans-serif;background:#f0f2f5;margin:0;display:flex;flex-direction:column;height:100vh}#messages{flex:1;overflow-y:auto;padding:15px}#input-area{display:flex;padding:10px;background:#fff}input{flex:1;padding:10px;border:1px solid #ccc;border-radius:20px;outline:none}button{margin-left:5px;padding:10px 20px;background:#25d366;color:#fff;border:none;border-radius:20px;cursor:pointer}</style></head><body><div id="login-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh"><h2>🚀 شات الأصحاب</h2><input id="u" placeholder="اكتب اسمك هنا..." style="margin:10px;width:80%;padding:10px;border-radius:10px;border:1px solid #ccc"><button onclick="login()" style="width:85%">دخول الشات</button></div><div id="chat-screen" style="display:none;flex-direction:column;height:100vh"><div id="messages"></div><div id="input-area"><input id="m" placeholder="اكتب رسالة..."><button onclick="send()">إرسال</button></div></div><script>const config={databaseURL:"https://friends-chat-f7a40-default-rtdb.firebaseio.com"};firebase.initializeApp(config);const db=firebase.database();let user="";function login(){user=document.getElementById("u").value;if(user){document.getElementById("login-screen").style.display="none";document.getElementById("chat-screen").style.display="flex";load()}}function send(){const m=document.getElementById("m");if(m.value){db.ref("chat").push({u:user,t:m.value});m.value=""}}function load(){db.ref("chat").on("child_added",s=>{const d=s.val();const msgDiv=document.createElement("div");msgDiv.innerHTML=`<b>${d.u}:</b> ${d.t}`;document.getElementById("messages").appendChild(msgDiv);document.getElementById("messages").scrollTop=document.getElementById("messages").scrollHeight;})}</script></body></html>
