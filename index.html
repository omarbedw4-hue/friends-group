<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>شات الجروبات 💬</title>
                <style>
                        body { font-family: sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
                                #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; }
                                        #chat-header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; }
                                                #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
                                                        .msg { background: white; padding: 10px; border-radius: 10px; max-width: 70%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
                                                                .input-area { background: #f0f0f0; padding: 15px; display: flex; gap: 10px; }
                                                                        input { padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
                                                                                button { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
                                                                                    </style>
                                                                                    </head>
                                                                                    <body>

                                                                                        <div id="login-screen">
                                                                                                <h2>مرحباً بك في شات الأصحاب 🚀</h2>
                                                                                                        <input type="text" id="user-name" placeholder="اكتب اسمك">
                                                                                                                <br>
                                                                                                                        <input type="text" id="group-name" placeholder="اسم الجروب (مثلاً: ابطال الاقصر)">
                                                                                                                                <br>
                                                                                                                                        <button onclick="enterChat()">دخول الشات</button>
                                                                                                                                            </div>

                                                                                                                                                <div id="chat-header">جروب: <span id="display-group">-</span></div>
                                                                                                                                                    <div id="chat-box"></div>

                                                                                                                                                        <div class="input-area">
                                                                                                                                                                <input type="text" id="msg-input" placeholder="اكتب رسالة...">
                                                                                                                                                                        <button onclick="sendMessage()">إرسال</button>
                                                                                                                                                                            </div>

                                                                                                                                                                                <script>
                                                                                                                                                                                        let myName = "";
                                                                                                                                                                                                let myGroup = "";

                                                                                                                                                                                                        function enterChat() {
                                                                                                                                                                                                        	            myName = document.getElementById('user-name').value;
                                                                                                                                                                                                        	                        myGroup = document.getElementById('group-name').value;
                                                                                                                                                                                                        	                                    if(myName && myGroup) {
                                                                                                                                                                                                        	                                    	                document.getElementById('display-group').innerText = myGroup;
                                                                                                                                                                                                        	                                    	                                document.getElementById('login-screen').style.display = 'none';
                                                                                                                                                                                                        	                                    	                                            } else {
                                                                                                                                                                                                        	                                    	                                            	                alert("اكتب اسمك واسم الجروب يا بطل!");
                                                                                                                                                                                                        	                                    	                                            	                            }
                                                                                                                                                                                                        	                                    	                                            	                                    }

                                                                                                                                                                                                        	                                    	                                            	                                            function sendMessage() {
                                                                                                                                                                                                        	                                    	                                            	                                            	            const input = document.getElementById('msg-input');
                                                                                                                                                                                                        	                                    	                                            	                                            	                        const chatBox = document.getElementById('chat-box');
                                                                                                                                                                                                        	                                    	                                            	                                            	                                    if(input.value.trim() !== "") {
                                                                                                                                                                                                        	                                    	                                            	                                            	                                    	                const msgDiv = document.createElement('div');
                                                                                                                                                                                                        	                                    	                                            	                                            	                                    	                                msgDiv.className = 'msg';
                                                                                                                                                                                                        	                                    	                                            	                                            	                                    	                                                msgDiv.innerHTML = `<strong>${myName}:</strong> <br> ${input.value}`;
                                                                                                                                                                                                        	                                    	                                            	                                            	                                    	                                                                chatBox.appendChild(msgDiv);
                                                                                                                                                                                                        	                                    	                                            	                                            	                                    	                                                                                input.value = "";
                                                                                                                                                                                                        	                                    	                                            	                                            	                                    	                                                                                                chatBox.scrollTop = chatBox.scrollHeight;
                                                                                                                                                                                                        	                                    	                                            	                                            	                                    	                                                                                                            }
                                                                                                                                                                                                        	                                    	                                            	                                            	                                    	                                                                                                                    }
                                                                                                                                                                                                        	                                    	                                            	                                            	                                    	                                                                                                                        </script>
                                                                                                                                                                                                        	                                    	                                            	                                            	                                    	                                                                                                                        </body>
                                                                                                                                                                                                        	                                    	                                            	                                            	                                    	                                                                                                                        </html>
                                                                                                                                                                                                        	                                    	                                            	                                            	                                    	                                                                                                                        
                                                                                                                                                                                                        	                                    	                                            	                                            	                                    }
                                                                                                                                                                                                        	                                    	                                            	                                            }
                                                                                                                                                                                                        	                                    	                                            }
                                                                                                                                                                                                        	                                    }
                                                                                                                                                                                                        }
