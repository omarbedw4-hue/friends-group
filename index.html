<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات الأصحاب</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; background: #075e54; color: white; }
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { background: white; padding: 10px; border-radius: 10px; max-width: 70%; color: black; }
        .mine { align-self: flex-end; background: #dcf8c6; }
        #input-area { display: flex; padding: 10px; background: #f0f0f0; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: none; }
        button { background: #128c7e; color: white; border: none; padding: 10px 15px; border-radius: 20px; margin-right: 5px; }
    </style>
</head>
<body>
<div id="login-screen">
    <h1>شات الأصحاب</h1>
    <input type="text" id="username-input" placeholder="اكتب اسمك...">
    <button onclick="login()">دخول</button>
</div>
<div id="chat-screen">
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="messageInput" placeholder="رسالة...">
        <button onclick="sendMessage()">إرسال</button>
    </div>
</div>
<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAPN16sswCQ_Ob3Z4rn031rZ9BWGbrZgCo",
      authDomain: "friends-chat-f7a40.firebaseapp.com",
      projectId: "friends-chat-f7a40",
      storageBucket: "friends-chat-f7a40.firebasestorage.app",
      messagingSenderId: "737122104560",
      appId: "1:737122104560:web:f971be387850424dc0fe35",
      databaseURL: "https://friends-chat-f7a40-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = "";
    function login() {
        const name = document.getElementById('username-input').value;
        if (name) { currentUser = name; document.getElementById('login-screen').style.display = 'none'; document.getElementById('chat-screen').style.display = 'flex'; loadMessages(); }
    }
    function sendMessage() {
        const msgText = document.getElementById('messageInput').value;
        if (msgText) { db.ref("messages").push().set({ user: currentUser, text: msgText, time: Date.now() }); document.getElementById('messageInput').value = ""; }
    }
    function loadMessages() {
        db.ref("messages").on("child_added", (snapshot) => {
            const data = snapshot.val();
            const msgDiv = document.createElement("div");
            msgDiv.classList.add("message");
            if (data.user === currentUser) msgDiv.classList.add("mine");
            msgDiv.innerText = data.user + ": " + data.text;
            document.getElementById("messages").appendChild(msgDiv);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });
    }
</script>
</body>
</html>
